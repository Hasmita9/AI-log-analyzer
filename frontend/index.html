<!DOCTYPE html>
<html>
<head>
  <title>AI Log Analyzer</title>

  <style>

/* BASE */
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e2e8f0;
}

/* LAYOUT */
.layout {
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 230px;
  height: 100vh;
  padding: 24px;
  background: rgba(15, 23, 42, 0.6);
  backdrop-filter: blur(12px);
  border-right: 1px solid rgba(255,255,255,0.05);
}

.sidebar h2 {
  margin-bottom: 40px;
}

/* Sidebar items with icons */
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 18px 0;
  color: #94a3b8;
  font-size: 14px;
  transition: 0.2s;
  cursor: pointer;
}

.sidebar-item:hover {
  color: white;
  transform: translateX(4px);
}

/* MAIN */
.main {
  flex: 1;
}

/* HEADER */
header {
  padding: 18px 28px;
  background: rgba(15, 23, 42, 0.6);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: 600;
  font-size: 15px;
}

.live {
  color: #22c55e;
  font-size: 12px;
  margin-left: 10px;
}

/* CONTAINER */
.container {
  padding: 30px;
}

/* STATS */
.stats {
  display: flex;
  gap: 20px;
  margin-bottom: 25px;
}

.stat-card {
  flex: 1;
  padding: 20px;
  border-radius: 14px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.05);
  position: relative;
  overflow: hidden;
}

.stat-card::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top right, rgba(99,102,241,0.15), transparent 60%);
  opacity: 0.6;
}

.stat-card p {
  color: #94a3b8;
  font-size: 12px;
  margin-bottom: 6px;
}

.stat-card h2 {
  font-size: 26px;
  color: #f1f5f9;
}

/* SEARCH BAR */
.search-box {
  position: relative;
  width: 280px;
  margin-bottom: 25px;
}

.search {
  width: 100%;
  padding: 12px 16px 12px 36px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 10px;
  font-size: 14px;
  color: #94a3b8;
}

/* GRID */
.grid {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}

/* CARD */
.card {
  width: 260px;
  padding: 20px;
  border-radius: 16px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.06);
  transition: 0.25s ease;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 30px rgba(99,102,241,0.25);
}

/* TEXT */
h3 {
  color: #f1f5f9;
}

.desc {
  color: #94a3b8;
  font-size: 13px;
}

.errors {
  margin-top: 8px;
  font-size: 14px;
  color: #cbd5f5;
}

.time {
  font-size: 12px;
  color: #64748b;
  margin-top: 6px;
}

/* MINI CHART */
.trend {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 40px;
  margin: 14px 0;
}

.trend div {
  width: 3px;
  border-radius: 2px;
  background: linear-gradient(180deg, #22d3ee, #6366f1);
}

/* BADGES */
.badge {
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 11px;
}

.badge.critical {
  background: rgba(239,68,68,0.08);
  color: #fca5a5;
}

.badge.high {
  background: rgba(251,146,60,0.08);
  color: #fdba74;
}

.badge.medium {
  background: rgba(250,204,21,0.08);
  color: #fde047;
}

.badge.low {
  background: rgba(148,163,184,0.08);
  color: #cbd5f5;
}

/* BUTTONS */
button {
  padding: 6px 12px;
  border-radius: 8px;
  border: none;
  background: rgba(99,102,241,0.15);
  color: #c7d2fe;
  cursor: pointer;
}

button:hover {
  background: rgba(99,102,241,0.3);
}

.delete {
  background: transparent;
  border: 1px solid rgba(248,113,113,0.4);
  color: #fca5a5;
  margin-left: 8px;
}

.delete:hover {
  background: rgba(248,113,113,0.1);
}

.actions {
  margin-top: 12px;
}

  </style>

</head>

<body>

<div class="layout">

  <div class="sidebar">
    <h2>⚡</h2>
    <div class="sidebar-item">📁 Projects</div>
    <div class="sidebar-item">🐞 Errors</div>
    <div class="sidebar-item">⚙️ Settings</div>
  </div>

  <div class="main">

    <header>
      <div class="logo">⚡ AI Log Analyzer <span class="live">● LIVE</span></div>
      <button onclick="loadProjects()">Refresh</button>
    </header>

    <div class="container">

      <div class="stats">
        <div class="stat-card">
          <p>Projects</p>
          <h2 id="totalProjects">0</h2>
        </div>

        <div class="stat-card">
          <p>Errors</p>
          <h2 id="totalErrors">0</h2>
        </div>

        <div class="stat-card">
          <p>Critical</p>
          <h2 id="criticalErrors" style="color:#f87171;">0</h2>
        </div>
      </div>

      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input class="search" placeholder="Search projects..." />
      </div>

      <h2>Projects</h2>

      <div class="grid" id="projectsContainer"></div>

    </div>
  </div>

</div>

<script>
console.log("JS RUNNING");
async function loadProjects() {
  const res = await fetch("http://127.0.0.1:5000/api/projects");
  const projects = await res.json();

  const container = document.getElementById("projectsContainer");
  container.innerHTML = "";

  let totalErrors = 0;
  let criticalCount = 0;

  projects.forEach(p => {

    const errors = Math.floor(Math.random() * 500);
    totalErrors += errors;

    const levels = ["low","medium","high","critical"];
    const severity = levels[Math.floor(Math.random()*levels.length)];

    if (severity === "critical") criticalCount++;

    const card = `
      <div class="card">
        <h3>${p.name}</h3>
        <p class="desc">Application monitoring</p>

        <div class="trend">
          <div style="height:10px"></div>
          <div style="height:20px"></div>
          <div style="height:15px"></div>
          <div style="height:25px"></div>
        </div>

        <p class="errors">Errors: ${errors}</p>
        <span class="badge ${severity}">${severity}</span>

        <p class="time">Last updated just now</p>

        <div class="actions">
          <button onclick="viewProject(${p.id})">View</button>
          <button class="delete" onclick="deleteProject(${p.id})">Delete</button>
        </div>
      </div>
    `;

    container.insertAdjacentHTML("beforeend", card);
  });

  document.getElementById("totalProjects").innerText = projects.length;
  document.getElementById("totalErrors").innerText = totalErrors;
  document.getElementById("criticalErrors").innerText = criticalCount;
}

function viewProject(id) {
  alert("Opening project ID: " + id);
}

async function deleteProject(id) {
  if (!confirm("Delete this project?")) return;

  await fetch(`http://127.0.0.1:5000/api/projects/${id}`, {
    method: "DELETE"
  });

  loadProjects();
}

loadProjects();

</script>

</body>
</html>
